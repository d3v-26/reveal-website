<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REVEAL — Model Arena</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #08090c;
    --surface: #10121a;
    --border: #1e2130;
    --text: #e8e6e1;
    --text-dim: #6b6d7b;
    --accent: #c8ff2e;
    --accent-dim: rgba(200, 255, 46, 0.08);
  }

  html { font-size: 16px; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── grain overlay ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 9999;
    pointer-events: none;
    opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px;
  }

  /* ── ambient glow ── */
  .glow {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.12;
    pointer-events: none;
    z-index: 0;
  }
  .glow--1 { top: -200px; left: -100px; background: var(--accent); }
  .glow--2 { bottom: -300px; right: -200px; background: #5e4fff; opacity: 0.08; }

  /* ── layout ── */
  .page {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 80px 32px 120px;
  }

  /* ── header ── */
  .header { margin-bottom: 80px; }

  .tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards;
  }
  .tag::before {
    content: '';
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(3rem, 8vw, 5.5rem);
    line-height: 0.95;
    letter-spacing: -0.03em;
    margin-bottom: 24px;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.1s forwards;
  }
  .title span {
    display: inline-block;
    color: var(--accent);
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-weight: 400;
  }

  .subtitle {
    font-size: 0.85rem;
    color: var(--text-dim);
    line-height: 1.7;
    max-width: 480px;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.2s forwards;
  }

  /* ── model cards ── */
  .grid {
    display: grid;
    gap: 16px;
  }

  .card {
    position: relative;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 24px;
    padding: 28px 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    text-decoration: none;
    color: var(--text);
    transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    overflow: hidden;
    opacity: 0;
    transform: translateY(20px);
  }
  .card:nth-child(1) { animation: fadeUp 0.6s ease 0.3s forwards; }
  .card:nth-child(2) { animation: fadeUp 0.6s ease 0.4s forwards; }
  .card:nth-child(3) { animation: fadeUp 0.6s ease 0.5s forwards; }
  .card:nth-child(4) { animation: fadeUp 0.6s ease 0.6s forwards; }
  .card:nth-child(5) { animation: fadeUp 0.6s ease 0.7s forwards; }
  .card:nth-child(6) { animation: fadeUp 0.6s ease 0.8s forwards; }
  .card:nth-child(7) { animation: fadeUp 0.6s ease 0.9s forwards; }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--accent-dim), transparent 60%);
    opacity: 0;
    transition: opacity 0.35s ease;
  }

  .card:hover {
    border-color: rgba(200, 255, 46, 0.25);
    transform: translateY(-2px);
    box-shadow: 0 8px 40px rgba(0,0,0,0.3), 0 0 0 1px rgba(200,255,46,0.08);
  }
  .card:hover::before { opacity: 1; }
  .card:hover .card__arrow { transform: translateX(4px); color: var(--accent); }
  .card:hover .card__index { color: var(--accent); }

  .card__index {
    position: relative;
    z-index: 1;
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 2.2rem;
    line-height: 1;
    color: var(--text-dim);
    min-width: 42px;
    transition: color 0.35s ease;
  }

  .card__body { position: relative; z-index: 1; }

  .card__name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.15rem;
    letter-spacing: -0.01em;
    margin-bottom: 4px;
  }

  .card__meta {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 0.72rem;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }

  .card__badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    background: rgba(200, 255, 46, 0.06);
    border: 1px solid rgba(200, 255, 46, 0.12);
    border-radius: 100px;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
  }

  .card__arrow {
    position: relative;
    z-index: 1;
    font-size: 1.4rem;
    color: var(--text-dim);
    transition: all 0.35s ease;
  }

  /* ── footer ── */
  .footer {
    margin-top: 80px;
    padding-top: 32px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.9s forwards;
  }
  .footer a {
    color: var(--text-dim);
    text-decoration: none;
    transition: color 0.2s;
  }
  .footer a:hover { color: var(--accent); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── responsive ── */
  @media (max-width: 600px) {
    .page { padding: 48px 20px 80px; }
    .header { margin-bottom: 48px; }
    .card { grid-template-columns: 1fr auto; gap: 16px; padding: 22px 20px; }
    .card__index { display: none; }
    .footer { flex-direction: column; gap: 12px; text-align: center; }
  }
</style>
</head>
<body>

<div class="glow glow--1"></div>
<div class="glow glow--2"></div>

<div class="page">

  <header class="header">
    <div class="tag">Live Demos</div>
    <h1 class="title">REVEAL <span>Arena</span></h1>
    <p class="subtitle">Side-by-side generations from different models. Pick a model below to explore its output. Adding a new model is as simple as dropping in a folder.</p>
  </header>

  <div class="grid" id="grid"></div>

  <footer class="footer">
    <span>REVEAL &copy; 2025</span>
    <a href="https://github.com/" target="_blank">GitHub ↗</a>
  </footer>

</div>

<script>
  // ╔══════════════════════════════════════════╗
  // ║  ADD NEW MODELS HERE — one object each   ║
  // ╚══════════════════════════════════════════╝
  const models = [
    {
      name: "OpenClaw",
      path: "openclaw",
      badge: "REVEAL 1",
      meta: "Original release"
    },
    {
      name: "GPT-5.2",
      path: "gpt-5.2",
      badge: "REVEAL 2",
      meta: "Second generation"
    },
    {
      name: "Claude Code (Opus 4.6)",
      path: "claude-code",
      badge: "REVEAL 3",
      meta: "Third generation"
    },
    {
      name: "OpenCode Simple",
      path: "opencode",
      badge: "REVEAL 4",
      meta: "Fourth generation"
    },
    {
      name: "OpenCode Enhanced Frontend",
      path: "opencode-enhanced",
      badge: "REVEAL 5",
      meta: "Fifth generation"
    },
     {
      name: "Stitch UI",
      path: "stitch",
      badge: "REVEAL 6",
      meta: "Sixth generation"
    },
    {
      name: "Claude Design (Opus 4.7)",
      path: "claude-design",
      badge: "REVEAL 7",
      meta: "Seventh generation"
    },
  ];

  const grid = document.getElementById('grid');

  models.forEach((m, i) => {
    const a = document.createElement('a');
    a.href = `./${m.path}/`;
    a.className = 'card';
    a.innerHTML = `
      <div class="card__index">${String(i + 1).padStart(2, '0')}</div>
      <div class="card__body">
        <div class="card__name">${m.name}</div>
        <div class="card__meta">
          <span class="card__badge">${m.badge}</span>
          <span>${m.meta}</span>
        </div>
      </div>
      <div class="card__arrow">→</div>
    `;
    grid.appendChild(a);
  });
</script>

</body>
</html>
